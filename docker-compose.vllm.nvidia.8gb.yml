services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server-nvidia
    restart: always
    ports:
      - "8000:8000"
    ipc: host
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model Qwen/Qwen2.5-7B-Instruct-AWQ
      --quantization awq
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --trust-remote-code
