services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-vision
    restart: always
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model cyankiwi/Qwen3-VL-4B-Instruct-AWQ-4bit
      --gpu-memory-utilization 0.92
      --max-model-len 2560
      --max-num-seqs 1
      --trust-remote-code
      --enforce-eager
      --disable-log-stats

  ocr-worker:
    build: .
    container_name: ocr-vision-worker
    restart: always
    ports:
      - "5000:5000"
    environment:
      - VLLM_URL=http://vllm:8000/v1
      - LLM_MODEL=cyankiwi/Qwen3-VL-4B-Instruct-AWQ-4bit
    command: python worker_api.py
